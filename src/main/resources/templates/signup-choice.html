<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            min-height:100vh;
            background: linear-gradient(135deg, #4f8dfd, #8bb8ff, #dceaff);
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .choice-wrapper{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:30px 15px;
        }
        .choice-card{
            width:100%;
            max-width:900px;
            border:none;
            border-radius:24px;
            background:rgba(255,255,255,0.96);
            box-shadow:0 18px 45px rgba(0,0,0,0.18);
            padding:40px;
        }
        .role-card{
            border:1px solid #dbe2ea;
            border-radius:20px;
            padding:30px;
            text-align:center;
            background:#f8fbff;
            transition:0.3s;
            height:100%;
        }
        .role-card:hover{
            transform:translateY(-5px);
            box-shadow:0 12px 24px rgba(0,0,0,0.12);
        }
        .btn-role{
            border:none;
            border-radius:12px;
            padding:12px 20px;
            font-weight:700;
            background:linear-gradient(90deg, #2563eb, #3b82f6);
            color:white;
            text-decoration:none;
            display:inline-block;
        }
        .btn-role:hover{
            color:white;
        }
    </style>
</head>
<body>
<div class="choice-wrapper">
    <div class="choice-card">
        <h2 class="text-center fw-bold mb-3">Choose Registration Type</h2>
        <p class="text-center text-muted mb-4">Select how you want to register in AuthenHire</p>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="role-card">
                    <h3 class="fw-bold">Job Seeker</h3>
                    <p class="text-muted">Create profile, search jobs, and apply for opportunities.</p>
                    <a th:href="@{/signup/jobseeker}" class="btn-role">Register as Job Seeker</a>
                </div>
            </div>

            <div class="col-md-6">
                <div class="role-card">
                    <h3 class="fw-bold">Company</h3>
                    <p class="text-muted">Register company, verify profile, and post jobs.</p>
                    <a th:href="@{/signup/company}" class="btn-role">Register as Company</a>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            Already have an account? <a th:href="@{/login}">Login</a>
        </div>
    </div>
</div>
</body>
</html>
