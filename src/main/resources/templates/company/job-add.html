<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Add Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#eef2f7,#d9e4f5);
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height:100vh;
}

.page-container{
    max-width:750px;
    margin:auto;
    margin-top:50px;
}

.page-card{
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.page-title{
    font-weight:700;
    color:#2c3e50;
    margin-bottom:25px;
}

.form-label{
    font-weight:600;
    color:#444;
}

.form-control{
    border-radius:8px;
}

textarea{
    resize:none;
}

.btn-post{
    background:#4f8dfd;
    border:none;
    padding:10px 22px;
    border-radius:8px;
    font-weight:500;
}

.btn-post:hover{
    background:#2f6fe0;
}

.back-link{
    text-decoration:none;
    font-weight:500;
}

</style>

</head>

<body>

<div class="container page-container">
<div class="page-card">

<h3 class="page-title">Post Job (Only Verified Companies)</h3>

<form th:action="@{/company/jobs/add}" method="post">

    <div class="mb-3">
        <label class="form-label">Job Title</label>
        <input class="form-control" name="title" placeholder="Example: Software Developer" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Job Description</label>
        <textarea class="form-control" name="description" rows="5"
        placeholder="Describe responsibilities, skills required, etc." required></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Location</label>
        <input class="form-control" name="location" placeholder="Example: Bangalore">
    </div>

    <div class="mb-3">
        <label class="form-label">Salary Range</label>
        <input class="form-control" name="salary" placeholder="Example: 5 LPA - 8 LPA">
    </div>

    <div class="mb-3">
        <label class="form-label">Job Type</label>
        <select class="form-control" name="jobType">
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Internship">Internship</option>
            <option value="Contract">Contract</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Experience Required</label>
        <input class="form-control" name="experience" placeholder="Example: Fresher / 1-3 Years">
    </div>

    <div class="mb-3">
        <label class="form-label">Payment Method</label>
        <select class="form-control" name="paymentMethod" required>
            <option value="">Select Payment Method</option>
            <option value="UPI">UPI</option>
            <option value="Card">Card</option>
            <option value="NetBanking">Net Banking</option>
            <option value="Cash">Cash</option>
        </select>
    </div>

    <button type="submit" class="btn btn-post text-white">
        Post Job
    </button>

</form>

<br>

<a class="back-link" th:href="@{/company/jobs}">
    ← Back to Jobs
</a>

</div>
</div>

</body>
</html>
