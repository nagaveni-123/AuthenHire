<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Login</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:#f8f9fa;
      padding-top:120px;   /* remove navbar overlap */
    }

    .navbar-glass{
      background:#0d6efd !important;   /* blue navbar */
      box-shadow:0 8px 25px rgba(0,0,0,0.18);
    }

    .navbar-glass .nav-link,
    .navbar-glass .nav-btn{
      color:#ffffff !important;
    }
  </style>
</head>

<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container my-5" style="max-width: 480px;">
  <div class="card shadow-sm rounded-4">
    <div class="card-body p-4">
      <h4 class="fw-bold mb-3">Login</h4>

      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <form th:action="@{/login}" method="post" class="vstack gap-2">
        <input class="form-control" name="email" placeholder="Email" required>
        <input class="form-control" name="password" placeholder="Password" type="password" required>
        <button class="btn btn-primary mt-2">Login</button>
      </form>

      <p class="small text-muted mt-3 mb-0">
        New user? <a th:href="@{/signup}">Create account</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
