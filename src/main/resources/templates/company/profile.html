<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Company Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb, #38bdf8);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            position:relative;
            overflow-x:hidden;
        }

        @keyframes gradientMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        body::before,
        body::after{
            content:"";
            position:absolute;
            border-radius:50%;
            filter:blur(100px);
            z-index:0;
        }

        body::before{
            width:260px;
            height:260px;
            background:rgba(255,255,255,0.18);
            top:40px;
            left:50px;
        }

        body::after{
            width:300px;
            height:300px;
            background:rgba(59,130,246,0.25);
            bottom:40px;
            right:40px;
        }

        .profile-container{
            max-width:820px;
            margin:auto;
            padding:50px 15px;
            position:relative;
            z-index:2;
        }

        .profile-card{
            background:rgba(255,255,255,0.14);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.20);
            padding:38px;
            border-radius:28px;
            box-shadow:0 20px 45px rgba(0,0,0,0.25);
            color:white;
        }

        .page-title{
            font-size:32px;
            font-weight:700;
            margin-bottom:8px;
            color:#ffffff;
            display:flex;
            align-items:center;
            gap:12px;
        }

        .page-subtitle{
            color:rgba(255,255,255,0.82);
            margin-bottom:28px;
            font-size:15px;
        }

        .form-label{
            font-weight:600;
            color:#f8fafc;
            margin-bottom:8px;
        }

        .input-group-text{
            background:rgba(255,255,255,0.12);
            border:1px solid rgba(255,255,255,0.18);
            color:#ffffff;
            border-radius:14px 0 0 14px;
        }

        .form-control{
            height:50px;
            border-radius:14px;
            border:1px solid rgba(255,255,255,0.20);
            background:rgba(255,255,255,0.10);
            color:#ffffff;
            padding:12px 15px;
            box-shadow:none;
            transition:all 0.3s ease;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,0.65);
        }

        .form-control:focus{
            background:rgba(255,255,255,0.16);
            border-color:#93c5fd;
            box-shadow:0 0 0 4px rgba(147,197,253,0.18);
            color:#ffffff;
        }

        textarea.form-control{
            height:auto;
            resize:none;
            min-height:130px;
        }

        .field-box{
            margin-bottom:20px;
        }

        .save-btn{
            border:none;
            padding:12px 28px;
            border-radius:14px;
            color:white;
            font-weight:600;
            font-size:16px;
            background:linear-gradient(90deg,#06b6d4,#2563eb,#4f46e5);
            box-shadow:0 12px 24px rgba(37,99,235,0.35);
            transition:all 0.3s ease;
        }

        .save-btn:hover{
            transform:translateY(-2px) scale(1.02);
            box-shadow:0 16px 32px rgba(37,99,235,0.45);
        }

        .back-link{
            display:inline-flex;
            align-items:center;
            gap:8px;
            margin-top:20px;
            text-decoration:none;
            font-weight:600;
            color:#ffffff;
            transition:0.3s ease;
        }

        .back-link:hover{
            color:#dbeafe;
            transform:translateX(-2px);
        }

        .header-badge{
            display:inline-block;
            padding:7px 14px;
            border-radius:30px;
            background:rgba(255,255,255,0.15);
            color:#e0f2fe;
            font-size:13px;
            font-weight:600;
            margin-bottom:14px;
            border:1px solid rgba(255,255,255,0.15);
        }

        @media(max-width:768px){
            .profile-container{
                padding:25px 12px;
            }

            .profile-card{
                padding:24px;
                border-radius:22px;
            }

            .page-title{
                font-size:25px;
            }

            .save-btn{
                width:100%;
            }
        }
    </style>
</head>

<body>

<div class="profile-container">
    <div class="profile-card">

        <div class="header-badge">
            <i class="fa-solid fa-building me-2"></i>Company Management
        </div>

        <h3 class="page-title">
            <i class="fa-solid fa-pen-to-square"></i>
            Edit Company Profile
        </h3>

        <p class="page-subtitle">
            Update your company details with a premium and professional profile setup.
        </p>

        <form th:action="@{/company/profile/update}" method="post">

            <div class="field-box">
                <label class="form-label">Company Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-building"></i></span>
                    <input class="form-control" name="name" th:value="${company.name}" required placeholder="Enter company name">
                </div>
            </div>

            <div class="field-box">
                <label class="form-label">Website</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-globe"></i></span>
                    <input class="form-control" name="website" th:value="${company.website}" placeholder="Enter company website">
                </div>
            </div>

            <div class="field-box">
                <label class="form-label">Location</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
                    <input class="form-control" name="location" th:value="${company.location}" placeholder="Enter company location">
                </div>
            </div>

            <div class="field-box">
                <label class="form-label">Logo URL</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-image"></i></span>
                    <input class="form-control" name="logoUrl" th:value="${company.logoUrl}" placeholder="Enter logo image URL">
                </div>
            </div>

            <div class="field-box">
                <label class="form-label">About Company</label>
                <textarea class="form-control" name="about" rows="5" th:text="${company.about}" placeholder="Write about your company"></textarea>
            </div>

            <button type="submit" class="save-btn">
                <i class="fa-solid fa-floppy-disk me-2"></i>Save Changes
            </button>

        </form>

        <a class="back-link" th:href="@{/company/dashboard}">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Dashboard
        </a>

    </div>
</div>

</body>
</html>
