<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${company.name}">Company</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: body"></div>

<div class="container my-4">
  <div class="card shadow-sm rounded-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h4 class="fw-bold mb-1" th:text="${company.name}">Company Name</h4>
          <div class="text-muted">
            <span th:text="${company.location}">Location</span>
            <span class="badge bg-success ms-2" th:if="${company.verified}">Verified</span>
          </div>
          <div class="text-primary small mt-2" th:text="${company.website}">Website</div>
        </div>
      </div>

      <hr>
      <h6 class="fw-bold">About</h6>
      <p class="text-muted" th:text="${company.about}">About company...</p>
    </div>
  </div>
</div>

<div th:replace="fragments/footer :: body"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
