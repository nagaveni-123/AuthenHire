<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<style>
.navbar-glass{
    background: rgba(13, 110, 253, 0.60);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    padding: 12px 0;
    z-index: 1030;
}

.navbar-brand{
    font-size: 1.6rem;
    color: #ffffff !important;
    font-weight: 700;
    line-height: 1.1;
    text-decoration: none !important;
}

.navbar-brand .sub-text{
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #ffffff !important;
    opacity: 0.95;
    margin-top: -2px;
}

.navbar-glass{
    background: linear-gradient(90deg, #4f46e5, #0ea5e9) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
}

.navbar-glass .nav-link,
.navbar-glass .nav-btn{
    color: #ffffff !important;
}
/* MAIN NAVBAR TEXT WHITE */
.navbar-glass .navbar-nav .nav-link,
.navbar-glass .navbar-nav .nav-link:link,
.navbar-glass .navbar-nav .nav-link:visited,
.navbar-glass .navbar-nav .nav-link:active,
.navbar-glass .navbar-nav .nav-link:focus{
    color: #ffffff !important;
    font-weight: 600;
    position: relative;
    padding: 8px 12px !important;
    text-decoration: none !important;
}

/* Hover */
.navbar-glass .navbar-nav .nav-link:hover{
    color: #ffd369 !important;
}

/* Underline hover */
.nav-hover::after{
    content: "";
    position: absolute;
    width: 0;
    height: 2px;
    left: 0;
    bottom: 0;
    background: #ffffff;
    transition: 0.3s;
}

.nav-hover:hover::after{
    width: 100%;
}
.logo-img{
    width: 120px !important;
    height: auto !important;
}

.navbar-brand{
    display: flex;
    align-items: center;
    padding: 0;
}
/* BUTTON LINKS */
.nav-btn{
    border-radius: 14px;
    padding: 8px 14px;
    font-weight: 600;
    text-decoration: none !important;
    display: inline-block;
    transition: 0.3s ease;
    white-space: nowrap;
}

.btn-login{
    background: rgba(255,255,255,0.18);
    color: #ffffff !important;
}

.btn-login:hover{
    background: #ffffff;
    color: #0d6efd !important;
}

.btn-signup{
    background: #ffffff;
    color: #0d6efd !important;
}

.btn-signup:hover{
    background: #eaf3ff;
    color: #0d6efd !important;
}

.btn-normal{
    border: 1px solid #ffffff;
    color: #ffffff !important;
}

.btn-normal:hover{
    background: #ffffff;
    color: #0d6efd !important;
}

.btn-premium{
    background: linear-gradient(135deg, #ffd700, #ff9800);
    color: #000000 !important;
    font-weight: 700;
}

.btn-premium:hover{
    transform: translateY(-1px);
    color: #000000 !important;
}

.btn-logout{
    background: #dc3545;
    color: #ffffff !important;
}

.btn-logout:hover{
    background: #bb2d3b;
    color: #ffffff !important;
}

.notification-link{
    position: relative;
    font-size: 18px;
}

.navbar-toggler{
    border: none;
}

.navbar-toggler:focus{
    box-shadow: none;
}

.navbar-toggler-icon{
    filter: brightness(0) invert(1);
}

@media (max-width: 991px){
    .navbar-collapse{
        margin-top: 14px;
        background: rgba(255,255,255,0.12);
        padding: 14px;
        border-radius: 14px;
    }

    .navbar-nav.ms-auto{
        margin-top: 12px;
    }

    .navbar-nav.ms-auto li{
        margin-bottom: 8px;
    }
 
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-glass fixed-top" th:fragment="body">
    <div class="container">
    <a class="navbar-brand" th:href="@{/}">
    <img th:src="@{/images/logo.png}" alt="AuthenHire Logo"
         style="height:100px; width:auto; max-width:250px; object-fit:contain; display:block;">
</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navBar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navBar">

            <ul class="navbar-nav me-auto">
    <li class="nav-item">
        <a class="nav-link nav-hover" style="color:#ffffff !important;" th:href="@{/}">Home</a>
    </li>
    <li class="nav-item">
        <a class="nav-link nav-hover" style="color:#ffffff !important;" th:href="@{/jobs}">Jobs</a>
    </li>
    <li class="nav-item">
        <a class="nav-link nav-hover" style="color:#ffffff !important;" th:href="@{/companies}">Companies</a>
    </li>
    <li class="nav-item" th:if="${session.userId != null}">
        <a th:href="@{/jobseeker/notifications}" 
           class="nav-link notification-link" 
           style="color:#ffffff !important;">
            🔔
            <span th:if="${unreadCount != null and unreadCount > 0}"
                  th:text="${unreadCount}"
                  class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill">
            </span>
        </a>
    </li>
</ul>

            <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
    <li th:if="${session.userId == null}">
        <a class="nav-btn btn-login" style="color:#ffffff !important;" th:href="@{/login}">Login</a>
    </li>
    <li th:if="${session.userId == null}">
        <a class="nav-btn btn-signup" style="color:#ffffff !important;" th:href="@{/signup}">Signup</a>
    </li>
    <li th:if="${session.userId == null}">
        <a class="nav-btn btn-normal" style="color:#ffffff !important;" th:href="@{/signup/jobseeker(plan='normal')}">Normal</a>
    </li>
    <li th:if="${session.userId == null}">
        <a class="nav-btn btn-premium" style="color:#ffffff !important;" th:href="@{/signup/jobseeker(plan='premium')}">👑 Premium</a>
    </li>
    <li th:if="${session.userId != null}">
        <a class="nav-btn btn-logout" style="color:#ffffff !important;" th:href="@{/logout}">Logout</a>
    </li>
</ul>
        </div>
    </div>
</nav>

</body>
</html>
