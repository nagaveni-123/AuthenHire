<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Company Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        width: 320px;
        text-align: center;
        animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    label {
        display: block;
        text-align: left;
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #4facfe;
        box-shadow: 0 0 5px rgba(79,172,254,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .error {
        color: red;
        margin-bottom: 15px;
        font-size: 14px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

</head>
<body>

<div class="login-container">
<h2>Company Login</h2>

<p th:if="${error}" th:text="${error}" class="error"></p>

<form th:action="@{/company/login}" method="post" autocomplete="off">
  <label>Email:</label>
  <input type="email" name="email" autocomplete="new-email" required>

  <label>Password:</label>
  <input type="password" name="password" autocomplete="new-password" required>

  <button type="submit">Login</button>
</form>
</div>

</body>
</html>
