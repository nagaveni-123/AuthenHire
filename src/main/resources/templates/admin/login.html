<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#4f8dfd,#8bb8ff,#dceaff);
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Login Card */

.login-card{
    background:white;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    padding:35px;
}

/* Title */

.login-title{
    font-weight:600;
    color:#2c3e50;
}

/* Inputs */

.form-control{
    border-radius:10px;
    padding:10px;
}

/* Login Button */

.btn-login{
    background:#4f8dfd;
    border:none;
    padding:10px;
    border-radius:10px;
    font-weight:500;
}

.btn-login:hover{
    background:#2f6fe0;
}

/* Demo text */

.demo-text{
    font-size:13px;
    color:#777;
}

</style>

</head>

<body>

<div class="container" style="max-width:450px;">

<div class="login-card">

<h4 class="login-title mb-3">Admin Login</h4>

<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

<form th:action="@{/admin/login}" method="post" class="vstack gap-3">

<input class="form-control" name="email" placeholder="Admin Email" required>

<input class="form-control" name="password" type="password" placeholder="Password" required>

<button class="btn btn-login text-white mt-2">Login</button>

</form>

<div class="demo-text mt-3">
Demo: admin@authenhire.com / admin123
</div>

</div>

</div>

</body>
</html>
