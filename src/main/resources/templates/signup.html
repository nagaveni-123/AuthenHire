<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      min-height:100vh;
      background: linear-gradient(135deg, #4f8dfd, #8bb8ff, #dceaff);
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .signup-wrapper{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px 15px;
    }

    .signup-card{
      width:100%;
      max-width:500px;
      border:none;
      border-radius:24px;
      background:rgba(255,255,255,0.96);
      box-shadow:0 18px 45px rgba(0,0,0,0.18);
      overflow:hidden;
    }

    .signup-card .card-body{
      padding:38px 32px;
    }

    .brand-title{
      font-size:30px;
      font-weight:800;
      color:#1e3a8a;
      margin-bottom:6px;
      text-align:center;
    }

    .premium-title{
      color:#b45309;
    }

    .sub-text{
      text-align:center;
      color:#64748b;
      margin-bottom:24px;
      font-size:15px;
    }

    .premium-box{
      background:linear-gradient(135deg, #fff7cc, #ffef99);
      border:1px solid #facc15;
      border-radius:16px;
      padding:14px 16px;
      margin-bottom:18px;
      color:#7c5700;
      font-weight:600;
      text-align:center;
    }

    .form-control, .form-select{
      border-radius:14px;
      padding:12px 14px;
      border:1px solid #dbe2ea;
      background:#f8fbff;
    }

    .form-control:focus, .form-select:focus{
      border-color:#3b82f6;
      box-shadow:0 0 0 0.2rem rgba(59,130,246,0.15);
      background:#fff;
    }

    .btn-signup{
      border:none;
      border-radius:14px;
      padding:12px;
      font-weight:700;
      background:linear-gradient(90deg, #2563eb, #3b82f6);
      color:white;
      transition:0.3s;
    }

    .btn-premium{
      background:linear-gradient(90deg, #f59e0b, #fbbf24);
      color:#1f2937;
    }

    .login-link{
      text-align:center;
      margin-top:18px;
      font-size:14px;
      color:#64748b;
    }

    .login-link a{
      text-decoration:none;
      font-weight:700;
      color:#2563eb;
    }
  </style>
</head>
<body>

<div class="signup-wrapper">
  <div class="signup-card">
    <div class="card-body">

      <h2 class="brand-title" th:if="${plan == 'normal'}">Job Seeker Registration</h2>
      <h2 class="brand-title premium-title" th:if="${plan == 'premium'}">👑 Premium Job Seeker Registration</h2>

      <p class="sub-text" th:if="${plan == 'normal'}">Create your account to apply for jobs</p>
      <p class="sub-text" th:if="${plan == 'premium'}">Create your premium account to get top jobs and extra benefits</p>

      <div class="premium-box" th:if="${plan == 'premium'}">
        Premium Benefits: More opportunities first, premium notifications, and better job visibility.
      </div>

      <form th:action="@{/signup/jobseeker}" method="post" enctype="multipart/form-data">

        <input type="hidden" name="planType" th:value="${plan == 'premium' ? 'PREMIUM' : 'NORMAL'}">

        <div class="mb-3">
          <input type="text" name="fullName" class="form-control" placeholder="Full Name" required>
        </div>

        <div class="mb-3">
          <input type="email" name="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="mb-3">
          <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <div class="mb-3">
          <input type="text" name="phone" class="form-control" placeholder="Phone Number" required>
        </div>

        <div class="mb-3">
          <input type="text" name="qualification" class="form-control" placeholder="Qualification" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Upload Resume</label>
          <input type="file" name="resumeFile" class="form-control" accept=".pdf,.doc,.docx">
        </div>

        <div th:if="${plan == 'premium'}">
          <div class="mb-3">
            <select name="candidateType" class="form-select">
              <option value="">Select Candidate Type</option>
              <option value="FRESHER">Fresher</option>
              <option value="EXPERIENCED">Experienced</option>
            </select>
          </div>

          <div class="mb-3">
            <input type="number" name="experienceYears" class="form-control" placeholder="Experience in Years">
          </div>

          <div class="mb-3">
            <input type="text" name="preferredLocation" class="form-control" placeholder="Preferred Job Location">
          </div>

          <div class="mb-3">
            <input type="text" name="skills" class="form-control" placeholder="Skills">
          </div>

          <div class="mb-3">
            <select name="paymentMethod" class="form-select">
              <option value="">Select Payment Method</option>
              <option value="UPI">UPI</option>
              <option value="CARD">Card</option>
              <option value="NET_BANKING">Net Banking</option>
            </select>
          </div>
        </div>

        <button type="submit"
                class="btn btn-signup w-100"
                th:classappend="${plan == 'premium' ? ' btn-premium' : ''}">
          <span th:text="${plan == 'premium' ? 'Create Premium Account' : 'Create Job Seeker Account'}"></span>
        </button>
      </form>

      <div class="login-link">
        Already have an account? <a th:href="@{/login}">Login</a>
      </div>

    </div>
  </div>
</div>

</body>
</html>
