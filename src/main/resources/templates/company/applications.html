<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Applications</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#eef2f7,#d9e4f5);
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height:100vh;
}

.page-container{
    max-width:1100px;
    margin:auto;
    margin-top:40px;
    margin-bottom:40px;
}

.page-card{
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.page-title{
    font-weight:700;
    color:#2c3e50;
    margin-bottom:25px;
}

.table{
    border-radius:12px;
    overflow:hidden;
    margin-bottom:20px;
}

.table thead{
    background:#4f8dfd;
    color:white;
}

.table th,
.table td{
    vertical-align:middle;
    padding:14px;
}

.table tbody tr:hover{
    background:#f8fbff;
}

.status-badge{
    padding:7px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    display:inline-block;
}

.status-pending{
    background:#fff3cd;
    color:#856404;
}

.status-approved{
    background:#d1e7dd;
    color:#0f5132;
}

.status-rejected{
    background:#f8d7da;
    color:#842029;
}

.reject-input{
    width:160px;
    border-radius:8px;
    border:1px solid #ced4da;
    padding:6px 10px;
    margin-right:6px;
}

.btn-action{
    border-radius:8px;
    font-weight:500;
    padding:6px 14px;
}

.action-group{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
}

.back-btn{
    border-radius:8px;
    padding:8px 18px;
    font-weight:500;
}
</style>
</head>

<body>

<div class="container page-container">
    <div class="page-card">
        <h2 class="page-title">Applications</h2>

        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Job</th>
                        <th>Status</th>
                        <th style="min-width:300px;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${applications}">
                        <td th:text="${a.studentName}"></td>
                        <td th:text="${a.jobTitle}"></td>
                        <td>
                            <span th:if="${a.status == 'PENDING'}"
                                  class="status-badge status-pending"
                                  th:text="${a.status}"></span>

                            <span th:if="${a.status == 'APPROVED'}"
                                  class="status-badge status-approved"
                                  th:text="${a.status}"></span>

                            <span th:if="${a.status == 'REJECTED'}"
                                  class="status-badge status-rejected"
                                  th:text="${a.status}"></span>

                            <span th:if="${a.status != 'PENDING' and a.status != 'APPROVED' and a.status != 'REJECTED'}"
                                  class="status-badge bg-secondary text-white"
                                  th:text="${a.status}"></span>
                        </td>
                        <td>
                            <div class="action-group">
                                <form th:action="@{'/company/applications/' + ${a.id} + '/approve'}"
                                      method="post" style="display:inline;">
                                    <button class="btn btn-success btn-sm btn-action" type="submit">
                                        Approve
                                    </button>
                                </form>

                                <form th:action="@{'/company/applications/' + ${a.id} + '/reject'}"
                                      method="post" style="display:inline-flex; gap:6px; align-items:center; flex-wrap:wrap;">
                                    <input class="reject-input" name="reason" placeholder="Reason">
                                    <button class="btn btn-danger btn-sm btn-action" type="submit">
                                        Reject
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(applications)}">
                        <td colspan="4" class="text-center text-muted">No applications found.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a class="btn btn-secondary back-btn" th:href="@{/company/dashboard}">← Back</a>
    </div>
</div>

</body>
</html>
