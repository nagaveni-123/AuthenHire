<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Company Verifications</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#eef2f7,#d9e4f5);
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Page Title */

.page-title{
    font-weight:600;
    margin-bottom:20px;
    color:#2c3e50;
}

/* Card container */

.page-card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

/* Filter buttons */

.filter-buttons a{
    border-radius:8px;
}

/* Table style */

.table{
    margin-top:15px;
}

.table thead{
    background:#4f8dfd;
    color:white;
}

.table td{
    vertical-align:middle;
}

/* File links */

.file-link{
    text-decoration:none;
    font-weight:500;
}

.file-link:hover{
    text-decoration:underline;
}

/* Status badges */

.badge-ai{
    background:#ffc107;
    color:black;
}

.badge-admin{
    background:#17a2b8;
}

/* Action buttons */

.action-btn{
    border-radius:8px;
}

</style>

</head>

<body class="p-4">

<div class="container">

<div class="page-card">

<h3 class="page-title">
Company Verifications 
(Status: <span class="badge bg-secondary" th:text="${status}"></span>)
</h3>

<div class="mb-3 filter-buttons">

<a class="btn btn-outline-warning btn-sm" 
   th:href="@{/admin/verifications(status='PENDING')}">
Pending
</a>

<a class="btn btn-outline-success btn-sm" 
   th:href="@{/admin/verifications(status='APPROVED')}">
Approved
</a>

<a class="btn btn-outline-danger btn-sm" 
   th:href="@{/admin/verifications(status='REJECTED')}">
Rejected
</a>

</div>


<table class="table table-bordered table-hover">

<thead>
<tr>
<th>ID</th>
<th>Company</th>
<th>GST</th>
<th>Pincode</th>
<th>AI Status</th>
<th>Admin Status</th>
<th>Documents</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

<tr th:each="v : ${verifications}">

<td th:text="${v.id}"></td>

<td th:text="${v.companyName}"></td>

<td th:text="${v.gstNumber}"></td>

<td th:text="${v.pincode}"></td>

<td>
<span class="badge badge-ai" th:text="${v.aiStatus}"></span>
</td>

<td>
<span class="badge badge-admin" th:text="${v.adminStatus}"></span>
</td>


<td>

<div>
<b>GST:</b>
<a class="file-link"
   th:if="${v.gstFile != null and !#strings.isEmpty(v.gstFile)}"
   th:href="@{${v.gstFile}}" target="_blank">
View GST
</a>
<span th:if="${v.gstFile == null or #strings.isEmpty(v.gstFile)}">No File</span>
</div>

<div>
<b>PAN:</b>
<a class="file-link"
   th:if="${v.panFile != null and !#strings.isEmpty(v.panFile)}"
   th:href="@{${v.panFile}}" target="_blank">
View PAN
</a>
<span th:if="${v.panFile == null or #strings.isEmpty(v.panFile)}">No File</span>
</div>

<div>
<b>INC:</b>
<a class="file-link"
   th:if="${v.incorporationFile != null and !#strings.isEmpty(v.incorporationFile)}"
   th:href="@{${v.incorporationFile}}" target="_blank">
View INC
</a>
<span th:if="${v.incorporationFile == null or #strings.isEmpty(v.incorporationFile)}">No File</span>
</div>

<div>
<b>ADDR:</b>
<a class="file-link"
   th:if="${v.addressProofFile != null and !#strings.isEmpty(v.addressProofFile)}"
   th:href="@{${v.addressProofFile}}" target="_blank">
View Address
</a>
<span th:if="${v.addressProofFile == null or #strings.isEmpty(v.addressProofFile)}">No File</span>
</div>

</td>


<td>

<form th:action="@{/admin/verifications/{id}/approve(id=${v.id})}" 
      method="post" style="display:inline;">

<button class="btn btn-sm btn-success action-btn" type="submit">
Approve
</button>

</form>

<form th:action="@{/admin/verifications/{id}/reject(id=${v.id})}" 
      method="post" style="display:inline;">

<button class="btn btn-sm btn-danger action-btn" type="submit">
Reject
</button>

</form>

</td>

</tr>

</tbody>

</table>

</div>
</div>

</body>
</html>
