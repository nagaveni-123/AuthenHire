<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Details</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
       .navbar-glass{
    background: linear-gradient(90deg, #0d6efd, #3d8bfd) !important;
}

/* TEXT WHITE */
.navbar-glass .nav-link,
.navbar-glass .nav-btn{
    color: #ffffff !important;
}

        body{
            background: linear-gradient(135deg, #eef4ff, #dbe9ff, #f8fbff);
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height:100vh;
            color:#2c3e50;
            padding-top:120px; /* FIX navbar overlap */
        }

        .page-container{
            max-width:950px;
            margin:0 auto;
            width:100%;
            padding:30px 15px 40px;
        }

        .page-card{
            background:white;
            padding:35px;
            border-radius:24px;
            box-shadow:0 15px 40px rgba(13, 110, 253, 0.15);
            border:1px solid rgba(13,110,253,0.08);
            position:relative;
            overflow:hidden;
        }

        .page-card::before{
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:6px;
            background: linear-gradient(90deg, #0d6efd, #20c997, #6f42c1);
        }

        .job-title{
            font-size:34px;
            font-weight:700;
            color:#1d3557;
            margin-bottom:8px;
        }

        .company-name{
            font-size:22px;
            font-weight:600;
            color:#0d6efd;
            margin-bottom:25px;
        }

        .info-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
            gap:18px;
            margin-bottom:25px;
        }

        .info-box{
            background:#f8fbff;
            border:1px solid #e3edff;
            border-radius:16px;
            padding:16px 18px;
            box-shadow:0 5px 12px rgba(0,0,0,0.04);
        }

        .info-label{
            font-size:13px;
            font-weight:700;
            color:#6c757d;
            text-transform:uppercase;
            letter-spacing:0.6px;
            margin-bottom:6px;
        }

        .info-value{
            font-size:16px;
            font-weight:600;
            color:#2c3e50;
        }

        .section-title{
            font-size:22px;
            font-weight:700;
            color:#1d3557;
            margin-top:25px;
            margin-bottom:12px;
            padding-left:12px;
            border-left:5px solid #0d6efd;
        }

        .description-box{
            background:#f9fbfe;
            border:1px solid #e7eefb;
            border-radius:16px;
            padding:20px;
            line-height:1.8;
            color:#444;
            font-size:16px;
        }

        .action-buttons{
            margin-top:30px;
            display:flex;
            flex-wrap:wrap;
            gap:15px;
        }

        .btn-apply{
            background: linear-gradient(90deg, #198754, #20c997);
            border:none;
            color:white;
            font-size:16px;
            font-weight:600;
            padding:12px 28px;
            border-radius:12px;
        }

        .btn-back{
            background: linear-gradient(90deg, #6c757d, #495057);
            border:none;
            color:white;
            font-size:16px;
            font-weight:600;
            padding:12px 28px;
            border-radius:12px;
            text-decoration:none;
            display:inline-block;
        }

        .job-badge{
            display:inline-block;
            background:linear-gradient(90deg, #e7f1ff, #d7e8ff);
            color:#0d6efd;
            font-weight:600;
            padding:8px 16px;
            border-radius:50px;
            font-size:14px;
            margin-bottom:20px;
        }

        .main-footer{
            background:#1d3557;
            color:white;
            text-align:center;
            padding:18px 10px;
            margin-top:30px;
            font-size:15px;
        }

        .main-footer p{
            margin:0;
        }
    </style>
</head>

<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container page-container">
    <div class="page-card">

        <div class="job-badge">Job Opportunity</div>

        <h2 class="job-title" th:text="${job.title}">Job Title</h2>
        <div class="company-name" th:text="${job.company.name}">Company Name</div>

        <div class="info-grid">
            <div class="info-box">
                <div class="info-label">Location</div>
                <div class="info-value" th:text="${job.location}">Pune</div>
            </div>

            <div class="info-box">
                <div class="info-label">Job Type</div>
                <div class="info-value" th:text="${job.jobType}">Full Time</div>
            </div>

            <div class="info-box">
                <div class="info-label">Experience</div>
                <div class="info-value" th:text="${job.experience}">2 Years</div>
            </div>

            <div class="info-box">
                <div class="info-label">Salary</div>
                <div class="info-value" th:text="${job.salaryRange}">₹4,00,000</div>
            </div>

            <div class="info-box">
                <div class="info-label">Posted At</div>
                <div class="info-value" th:text="${job.postedAt}">2026-04-19</div>
            </div>
        </div>

        <h5 class="section-title">Job Description</h5>
        <div class="description-box">
            <p th:text="${job.description}">Job description goes here...</p>
        </div>

        <div class="action-buttons">
            <form th:action="@{'/jobs/' + ${job.id} + '/apply'}" method="post">
                <button type="submit" class="btn btn-apply">Apply Job</button>
            </form>

            <a class="btn-back" th:href="@{/jobs}">← Back to Jobs</a>
        </div>

    </div>
</div>

<footer class="main-footer">
    <p>© 2026 AuthenHire | Secure & Trusted Job Recruitment Platform</p>
</footer>

</body>
</html>
