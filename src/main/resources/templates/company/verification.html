<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Company Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#eef2f7,#d9e4f5);
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height:100vh;
}

.container-box{
    max-width:900px;
    margin:auto;
    margin-top:40px;
}

.card-box{
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.page-title{
    font-weight:600;
    margin-bottom:25px;
    color:#2c3e50;
}

.info-box{
    background:#f8f9fb;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

.label{
    font-weight:600;
    color:#444;
}

.form-label{
    font-weight:600;
}

.form-control{
    border-radius:8px;
}

.submit-btn{
    background:#4f8dfd;
    color:white;
    border:none;
    padding:10px 25px;
    border-radius:8px;
    font-weight:500;
}

.submit-btn:hover{
    background:#2f6fe0;
}

.back-link{
    text-decoration:none;
    font-weight:500;
}

.error{
    color:red;
    font-weight:500;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container-box">

<div class="card-box">

<h3 class="page-title">Company Verification</h3>

<p class="error" th:if="${error}" th:text="${error}"></p>

<div class="info-box">

<p><span class="label">Company:</span> <span th:text="${company.name}"></span></p>

<p><span class="label">Verified:</span> 
<span class="badge bg-success" th:text="${company.verified}"></span></p>

<p><span class="label">Admin Status:</span> 
<span class="badge bg-primary" th:text="${company.adminStatus}"></span></p>

<p><span class="label">AI Status:</span> 
<span class="badge bg-warning text-dark" th:text="${company.aiStatus}"></span></p>

</div>

<div class="info-box" th:if="${verification != null}">

<p><b>Latest Verification Submission</b></p>

<p><span class="label">GST:</span> <span th:text="${verification.gstNumber}"></span></p>

<p><span class="label">Admin:</span> <span th:text="${verification.adminStatus}"></span></p>

<p><span class="label">AI:</span> <span th:text="${verification.aiStatus}"></span></p>

</div>

<hr>

<form th:action="@{/company/verification/submit}" method="post" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">GST Number</label>
<input class="form-control" name="gstNumber" required>
</div>

<div class="mb-3">
<label class="form-label">Address</label>
<input class="form-control" name="address" required>
</div>

<div class="mb-3">
<label class="form-label">Pincode</label>
<input class="form-control" name="pincode" required>
</div>

<div class="mb-3">
<label class="form-label">GST File</label>
<input class="form-control" type="file" name="gstFile">
</div>

<div class="mb-3">
<label class="form-label">PAN File</label>
<input class="form-control" type="file" name="panFile">
</div>

<div class="mb-3">
<label class="form-label">Incorporation File</label>
<input class="form-control" type="file" name="incorporationFile">
</div>

<div class="mb-3">
<label class="form-label">Address Proof File</label>
<input class="form-control" type="file" name="addressProofFile">
</div>

<button type="submit" class="submit-btn">Submit Verification</button>

</form>

<br>

<a class="back-link" th:href="@{/company/dashboard}">← Back to Dashboard</a>

</div>
</div>

</body>
</html>
