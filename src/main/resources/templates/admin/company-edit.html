<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Company</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0ecff, #f5f9ff);
      padding:30px 15px;
    }

    .page-container{
      max-width:1000px;
      margin:0 auto;
    }

    .back-btn{
      display:inline-block;
      text-decoration:none;
      background:#6c757d;
      color:white;
      padding:10px 18px;
      border-radius:10px;
      font-size:14px;
      font-weight:600;
      transition:0.3s;
      margin-bottom:20px;
    }

    .back-btn:hover{
      background:#5a6268;
      color:white;
      text-decoration:none;
    }

    .form-card{
      background:white;
      border-radius:20px;
      box-shadow:0 12px 30px rgba(0,0,0,0.12);
      padding:35px;
    }

    .page-title{
      font-size:30px;
      font-weight:700;
      color:#1f2d3d;
      margin-bottom:25px;
      border-bottom:2px solid #eef2f7;
      padding-bottom:12px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
    }

    .full-width{
      grid-column:1 / -1;
    }

    label{
      font-size:15px;
      font-weight:600;
      color:#374151;
      margin-bottom:8px;
    }

    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border:1px solid #d1d5db;
      border-radius:12px;
      outline:none;
      font-size:15px;
      background:#f9fbff;
      transition:0.3s;
    }

    input:focus, textarea:focus, select:focus{
      border-color:#3b82f6;
      background:white;
      box-shadow:0 0 0 4px rgba(59,130,246,0.12);
    }

    textarea{
      resize:vertical;
      min-height:120px;
    }

    .section-title{
      grid-column:1 / -1;
      margin-top:8px;
      margin-bottom:0;
      padding-top:10px;
      font-size:20px;
      font-weight:700;
      color:#1f2d3d;
      border-top:1px solid #e5e7eb;
    }

    .readonly-status{
      font-weight:700;
      cursor:not-allowed;
    }

    .status-verified{
      background:#dcfce7;
      color:#15803d;
      border:1px solid #86efac;
    }

    .status-rejected{
      background:#fee2e2;
      color:#b91c1c;
      border:1px solid #fca5a5;
    }

    .status-pending{
      background:#fff7ed;
      color:#b45309;
      border:1px solid #fdba74;
    }

    .submit-btn{
      margin-top:28px;
      border:none;
      background:linear-gradient(90deg,#16a34a,#22c55e);
      color:white;
      padding:13px 24px;
      border-radius:12px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 8px 18px rgba(34,197,94,0.25);
    }

    .submit-btn:hover{
      transform:translateY(-2px);
      background:linear-gradient(90deg,#15803d,#16a34a);
    }

    @media (max-width:768px){
      .form-grid{
        grid-template-columns:1fr;
      }

      .form-card{
        padding:22px;
      }

      .page-title{
        font-size:24px;
      }
    }
  </style>
</head>

<body>

<div class="page-container">
  <a class="back-btn" th:href="@{/admin/companies/{id}(id=${company.id})}">← Back</a>

  <div class="form-card">
    <h3 class="page-title">Edit Company</h3>

    <form th:action="@{/admin/companies/{id}/update(id=${company.id})}" method="post">
      <div class="form-grid">

        <div class="form-group">
          <label>Company Name</label>
          <input type="text" name="name" th:value="${company.name}" required>
        </div>

        <div class="form-group">
          <label>Website</label>
          <input type="text" name="website" th:value="${company.website}">
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" name="location" th:value="${company.location}">
        </div>

        <div class="form-group">
          <label>Logo URL</label>
          <input type="text" name="logoUrl" th:value="${company.logoUrl}">
        </div>

        <div class="form-group full-width">
          <label>About</label>
          <textarea name="about" rows="4" th:text="${company.about}"></textarea>
        </div>

        <div class="section-title">Status Information</div>

        <!-- OCR / AI Status: only display, not editable -->
        <div class="form-group">
          <label>OCR Verification</label>

          <input type="text"
                 th:value="${company.aiStatus}"
                 readonly
                 class="readonly-status"
                 th:classappend="${company.aiStatus == 'VERIFIED'} ? ' status-verified' :
                                 (${company.aiStatus == 'REJECTED'} ? ' status-rejected' : ' status-pending')">
        </div>

        <div class="form-group">
          <label>Admin Status</label>
          <select name="adminStatus">
            <option th:selected="${company.adminStatus=='PENDING'}" value="PENDING">PENDING</option>
            <option th:selected="${company.adminStatus=='APPROVED'}" value="APPROVED">APPROVED</option>
            <option th:selected="${company.adminStatus=='REJECTED'}" value="REJECTED">REJECTED</option>
          </select>
        </div>

        <div class="form-group">
          <label>Verified</label>
          <select name="verified">
            <option th:selected="${company.verified==true}" value="true">true</option>
            <option th:selected="${company.verified==false}" value="false">false</option>
          </select>
        </div>

      </div>

      <button class="submit-btn" type="submit">Save Changes</button>
    </form>
  </div>
</div>

</body>
</html>
