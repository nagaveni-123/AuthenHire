<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Company Jobs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== BODY ===== */
body{
    background: linear-gradient(135deg,#eef2f7,#d9e4f5);
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding-top: 100px; /* IMPORTANT for navbar */
}

/* ===== PAGE ===== */
.container-box{
    max-width:1100px;
    margin:auto;
}

.page-card{
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

/* HEADER */
.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.page-title{
    font-weight:700;
}

/* STATUS */
.status-box{
    background:#f5f7fb;
    padding:12px;
    border-left:5px solid #4f8dfd;
    border-radius:10px;
    margin-bottom:20px;
}

/* BUTTON */
.add-btn{
    background:#4f8dfd;
    color:white;
    padding:8px 18px;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
}

.add-btn:hover{
    background:#2f6fe0;
    color:white;
}

/* TABLE */
.table th{
    background:#4f8dfd;
    color:white;
}

.badge-job{
    background:#0d6efd;
    color:white;
    padding:6px 10px;
    border-radius:20px;
}

</style>
</head>

<body>

<!-- NAVBAR CALL -->
<div th:replace="fragments/navbar :: body"></div>

<div class="container-box">
    <div class="page-card">

        <div class="page-header">
            <h3 class="page-title">Company Job Listings</h3>
            <a class="add-btn" th:href="@{/company/jobs/add}">+ Add Job</a>
        </div>

        <div class="status-box">
            Verification Status :
            <b th:text="${company.verified}"></b>
        </div>

        <table class="table table-bordered table-hover">

            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Location</th>
                    <th>Type</th>
                    <th>Experience</th>
                    <th>Salary</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="j : ${jobs}">
                    <td th:text="${j.title}"></td>
                    <td th:text="${j.location}"></td>
                    <td><span class="badge-job" th:text="${j.jobType}"></span></td>
                    <td th:text="${j.experience}"></td>
                    <td th:text="${j.salaryRange}"></td>
                </tr>

                <tr th:if="${#lists.isEmpty(jobs)}">
                    <td colspan="5" class="text-center text-muted">No jobs posted yet</td>
                </tr>
            </tbody>

        </table>

        <a class="btn btn-secondary mt-3" th:href="@{/company/dashboard}">
            ← Back
        </a>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
