spring.application.name=authenhire
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:${DATABASE_URL:${MYSQL_URL:jdbc:h2:mem:authenhire;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}}
spring.datasource.username=${DB_USERNAME:${DATABASE_USERNAME:${MYSQLUSER:sa}}}
spring.datasource.password=${DB_PASSWORD:${DATABASE_PASSWORD:${MYSQLPASSWORD:}}}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:${DATABASE_DRIVER_CLASS_NAME:}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:${DATABASE_DIALECT:}}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-swallow-size=-1

app.ocr.tessdata-path=${TESSDATA_PATH:}
app.upload.dir=${UPLOAD_DIR:uploads}
