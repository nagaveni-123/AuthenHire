<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Post Job</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      background: linear-gradient(135deg,#eef4ff,#f8fbff,#e9f1ff);
      min-height:100vh;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .page-wrap{
      padding:40px 15px;
    }
    .job-card{
      max-width:800px;
      margin:auto;
      background:#fff;
      border-radius:22px;
      box-shadow:0 18px 40px rgba(0,0,0,0.10);
      padding:32px;
    }
    .title{
      font-size:2rem;
      font-weight:700;
      color:#1d2a3a;
      margin-bottom:8px;
    }
    .subtitle{
      color:#6c757d;
      margin-bottom:25px;
    }
    .form-label{
      font-weight:600;
    }
    .form-control, .form-select{
      border-radius:12px;
      padding:12px 14px;
    }
    textarea.form-control{
      min-height:140px;
      resize:none;
    }
    .btn-post{
      border-radius:12px;
      padding:12px;
      font-weight:600;
    }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="job-card">
    <h2 class="title">Post a Job</h2>
    <p class="subtitle">Only verified companies can post jobs.</p>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{/company/jobs/add}" method="post">
      <div class="mb-3">
        <label class="form-label">Job Title</label>
        <input type="text" name="title" class="form-control" placeholder="Java Developer" required>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Location</label>
          <div class="d-flex gap-2">
            <input type="text" id="location" name="location" class="form-control" placeholder="Enter location or click detect" required>
            <button type="button" class="btn btn-outline-primary" onclick="getLocation()">Detect</button>
          </div>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Job Type</label>
          <select name="jobType" class="form-select" required>
            <option value="">Select</option>
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Internship">Internship</option>
            <option value="Remote">Remote</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Experience</label>
          <input type="text" name="experience" class="form-control" placeholder="0-2 years">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Salary Range</label>
          <input type="text" name="salary" class="form-control" placeholder="3 LPA - 5 LPA">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Job Posting Fee</label>
        <input type="text" class="form-control" value="₹99" readonly>
      </div>

      <div class="mb-3">
        <label class="form-label">Payment Method</label>
        <select name="paymentMethod" class="form-select" required>
          <option value="">Select Payment Method</option>
          <option value="UPI">UPI</option>
          <option value="Card">Debit/Credit Card</option>
          <option value="NetBanking">Net Banking</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="form-label">Job Description</label>
        <textarea name="description" class="form-control" placeholder="Enter job description" required></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-post w-100">Pay & Post Job</button>
    </form>
  </div>
</div>

<script>
  function getLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(position) {
          document.getElementById("location").value =
            position.coords.latitude + ", " + position.coords.longitude;
        },
        function() {
          alert("Unable to fetch location. Please allow location access.");
        }
      );
    } else {
      alert("Geolocation is not supported by this browser.");
    }
  }
</script>

</body>
</html>
